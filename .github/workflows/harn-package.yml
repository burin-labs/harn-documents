name: Harn package

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  package:
    name: CI status
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Harn
        uses: burin-labs/harn/.github/actions/setup-harn@05e43962cdefae44a511e81942adeebc6fe47675
      - run: harn install --locked
      - run: harn check --strict-types lib.harn main.harn tests/test_main.harn
      - run: harn fmt --check lib.harn main.harn tests/test_main.harn
      - run: harn lint --strict lib.harn main.harn tests/test_main.harn
      - run: harn test tests/ --parallel
      - run: harn package check
      - run: harn package docs --check
      - run: harn package pack --dry-run
